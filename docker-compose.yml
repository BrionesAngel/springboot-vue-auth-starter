services:
  postgres:
    image: postgres:17 
    container_name: authapp-postgres
    restart: always
    profiles: ["db", "fullstack"] 
    environment:
      POSTGRES_DB: db          # ← DB name
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: authapp-backend
    profiles: ["fullstack"]
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db  
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app  

  frontend:
    build: ./frontend
    container_name: authapp-frontend
    profiles: ["fullstack"]
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080/api  
    depends_on:
      - backend

volumes:
  postgres_data: